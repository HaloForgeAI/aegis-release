name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate public release files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax
        run: |
          bash -n install.sh
          bash -n scripts/check-public-release.sh
          bash -n scripts/aegis-stop.sh
      - name: PowerShell syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw install.ps1))
          $null = [scriptblock]::Create((Get-Content -Raw scripts/aegis-stop.ps1))
      - name: Public native release shape
        run: |
          grep -q 'Aegis Core' README.md
          grep -q 'native' README.md
          grep -q 'HaloForgeAI/Aegis' README.md

name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate public release files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax
        run: |
          bash -n scripts/check-public-release.sh
      - name: Public release copy shape
        run: |
          grep -q 'macos-arm64.dmg' README.md
          grep -q 'windows-x64.msix' README.md
          grep -q 'android.apk' README.md
          grep -q 'android.aab' README.md
          grep -q 'ios.ipa' README.md
          grep -q 'HaloForgeAI/Aegis' README.md
          grep -q 'Tailscale Serve' README.md
          grep -q 'Cloudflare Tunnel' README.md
